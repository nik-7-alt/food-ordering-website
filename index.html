    <style>
        :root { --primary: #e67e22; --dark: #2c3e50; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); padding-bottom: 80px; }
        
        header { background: white; padding: 15px 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        header h1 { margin: 0; color: var(--dark); font-size: 1.5rem; }
        
        .menu-tabs { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; background: white; padding: 15px 10px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .tab-btn { padding: 8px 14px; border: 1px solid #ddd; background: #fafafa; border-radius: 20px; font-weight: bold; cursor: pointer; white-space: nowrap; font-size: 0.85rem; color: #555; transition: 0.2s; }
        .tab-btn:hover { background: #eee; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .menu-section { padding: 20px; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        
        .item-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .item-img { width: 100%; height: 130px; object-fit: cover; border-bottom: 2px solid var(--primary); }
        
        .item-info { padding: 12px; display: flex; flex-direction: column; flex-grow: 1; }
        .item-info h4 { margin: 0 0 5px; font-size: 0.95rem; color: var(--dark); line-height: 1.3; }
        .price { color: var(--primary); font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; }
        
        .add-btn { background: white; color: var(--primary); border: 2px solid var(--primary); padding: 8px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: auto; transition: 0.2s; }
        .add-btn:hover { background: var(--primary); color: white; }

        .cart-bar { position: fixed; bottom: 0; width: 100%; background: var(--primary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; box-sizing: border-box; font-size: 1.1rem; box-shadow: 0 -4px 15px rgba(0,0,0,0.2); }
    </style>
</head>

    let cart = [];

    function renderTabs() {
        const container = document.getElementById('tabContainer');
        Object.keys(menuData).forEach((cat, index) => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => renderMenu(cat, btn);
            container.appendChild(btn);
        });
        renderMenu(Object.keys(menuData)[0]); 
    }

    function renderMenu(category, btnElement) {
        if(btnElement) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
        }
        
        const display = document.getElementById('menuDisplay');
        display.innerHTML = `<div class="grid"></div>`;
        const grid = display.querySelector('.grid');

        menuData[category].forEach(item => {
            grid.innerHTML += `
                <div class="item-card">
                    <img src="${item.img}" alt="${item.n}" class="item-img" loading="lazy">
                    <div class="item-info">
                        <h4>${item.n}</h4>
                        <span class="price">₹${item.p}</span>
                        <button class="add-btn" onclick="addToCart('${item.n}', ${item.p})">+ Add</button>
                    </div>
                </div>
            `;
        });
    }

    function addToCart(name, price) {
        cart.push({name, price});
        updateCart();
    }

    function updateCart() {
        const total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById('cart-count').innerText = `🛒 ${cart.length} Items`;
        document.getElementById('cart-total').innerText = `Total: ₹${total}`;
    }

    function sendOrder() {
        if(cart.length === 0) return alert("Please select some food first!");
        let total = cart.reduce((s, i) => s + i.price, 0);
        let text = "*NEW CAFE ORDER*%0A--------------------%0A";
        cart.forEach((item, i) => text += `${i+1}. ${item.name} - ₹${item.price}%0A`);
        text += `--------------------%0A*Grand Total: ₹${total}*%0A%0A*Payment Mode: UPI / Cash*%0APlease confirm my order!`;
        
        // Update this with your actual WhatsApp number
        window.open(`https://wa.me/919876543210?text=${text}`); 
    }
